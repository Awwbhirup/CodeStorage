<html>
  <head>
    <title>TableTest</title>

    <link href="../Css/exam2.css" rel="stylesheet" />
  </head>

  <body>
    <div class="tablebox">
      <table>
        <caption>
          Number Letter Combo
        </caption>

        <tr class="fr">
          <td>*</td>
          <th>a</th>
          <th>b</th>
          <th>c</th>
          <th>d</th>
        </tr>

        <tr>
          <th>1</th>
          <td>1a</td>
          <td>1b</td>
          <td>1c</td>
          <td>1d</td>
        </tr>

        <tr>
          <th>2</th>
          <td>2a</td>
          <td>2b</td>
          <td>2c</td>
          <td>2d</td>
        </tr>

        <tr>
          <th>3</th>
          <td>3a</td>
          <td>3b</td>
          <td>3c</td>
          <td>3d</td>
        </tr>

        <tr>
          <th>4</th>
          <td>4a</td>
          <td>4b</td>
          <td>4c</td>
          <td>4d</td>
        </tr>
      </table>
    </div>

    <div class="lst">
      <ol>
        <li>
          Hello
          <div class="dwn">Abhirup Banik</div>
        </li>
        <li>Hello</li>
        <li>Hello</li>
      </ol>
    </div>
    <form>
      <label for="name">Full Name:</label><br />
      <input
        type="text"
        id="name"
        name="name"
        placeholder="John Doe"
        size="20"
        required
      /><br />
      <label for="mail">Email Id:</label><br />
      <input
        type="email"
        id="mail"
        name="mail"
        pattern="[a-zA-A0-9]@[a-zA-z].com"
        placeholder="abc123@gmail.com"
        required
      /><br />
      <label for="num">Phone:</label><br />
      <input
        type="tel"
        id="num"
        name="num"
        pattern="+91-[0-9]{10}"
        placeholder="+91-1234567890"
        required
      /><br />
      <label for="age">Age:</label><br />
      <input
        type="text"
        id="age"
        name="age"
        pattern="[0-9]{2}"
        min="18"
        placeholder="00"
        required
      /><br />
      <p>Gender:</p>
      <ul>
        <li>
          <label for="gen1">Male</label><br />
          <input type="radio" id="gen1" name="gen" required /><br />
        </li>
        <li>
          <label for="gen2">Female</label><br />
          <input type="radio" id="gen2" name="gen" required /><br />
        </li>
      </ul>
      <br />
    </form>

    <div class="form"></div>
  </body>
</html>
